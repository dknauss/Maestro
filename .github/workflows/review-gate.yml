name: Review gate

# Blocks a PR while an automated reviewer (Codex, Copilot, …) has a P1/P2 finding
# that hasn't been addressed — including review-BODY summaries that are not inline
# threads and therefore slip past "require conversation resolution" (this is how a
# Codex P2 merged past on PR #89). Publishes a commit status under the fixed
# context "Review gate (P1/P2 addressed)" so it can be a required check.
#
# Clear the gate by resolving the bot's inline thread, replying on the PR, or
# re-running the reviewer until its summary is clean. See .github/scripts/review-gate.js.
#
# SECURITY: every job below explicitly checks out `review-gate.js` from the
# repository's DEFAULT (protected) branch, never the PR head. This matters
# because the non-target triggers (`pull_request_review`, `issue_comment`) run
# with GITHUB_REF pointing at the PR merge ref, so a `checkout` without an
# explicit `ref` would run PR-supplied code. Pinning `ref` to the default branch
# guarantees the gate always executes trusted code. The job also never checks out
# or executes any other PR content — it reads PR data exclusively through the API.
# Do NOT remove the `ref:` pin.
#
# FORK LIMITATION: GitHub gives `pull_request` / `pull_request_review` /
# `issue_comment` events from FORKED repos a read-only token, so the
# `createCommitStatus` write cannot publish on those events. This repo's workflow
# is same-repo branch PRs (not forks), where the token is write-capable, so the
# gate is reliable here. If this repo ever starts accepting fork PRs, gate them
# manually (or move status publishing to a `workflow_run`/dispatch bridge) — do
# not make the required context trusted for fork PRs as-is.
#
# NOTE: resolving an inline thread does not itself re-run the gate
# (`pull_request_review_thread` is not a supported Actions trigger). After
# resolving, a push, PR comment, or new review refreshes the status.

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  issue_comment:
    types: [created, edited, deleted]

permissions:
  contents: read
  issues: read # PR conversation comments are read via the issues API
  pull-requests: read
  statuses: write

# One in-flight run per PR; a newer trigger supersedes an older one.
concurrency:
  group: review-gate-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  gate:
    # issue_comment fires on plain issues too — only act on PRs.
    if: ${{ github.event_name != 'issue_comment' || github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      # Pin to the default branch — see the SECURITY note above. This is the
      # trusted copy of the script regardless of which event triggered the run.
      - name: Check out review-gate script (default branch)
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/scripts/review-gate.js
          sparse-checkout-cone-mode: false

      - name: Evaluate unaddressed P1/P2 review findings
        uses: actions/github-script@v7
        with:
          script: |
            const gate = require('./.github/scripts/review-gate.js');
            await gate({ github, context, core });
